<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paintings Gallery - Soodi Arts</title>
  <meta name="description" content="Browse Soodi's collection of original hand-painted acrylic artworks - cityscapes, florals, portraits, and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="gallery.css">
</head>
<body>
  <nav class="nav" id="nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">Soodi Arts</a>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="paintings.html" class="active">Paintings</a></li>
        <li><a href="cushions.html">Cushions</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <header class="gallery-hero paintings-hero">
    <h1>Paintings</h1>
    <p>Original hand-painted acrylic artworks</p>
  </header>

  <section class="section">
    <div class="container">
      <div class="gallery-filter">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="portrait">Portraits</button>
        <button class="filter-btn" data-filter="cityscape">Cityscapes</button>
        <button class="filter-btn" data-filter="floral">Florals</button>
        <button class="filter-btn" data-filter="landscape">Landscapes</button>
        <button class="filter-btn" data-filter="animal">Animals</button>
        <button class="filter-btn" data-filter="still-life">Still Life</button>
      </div>

      <div class="masonry-grid" id="gallery">
      </div>
    </div>
  </section>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" aria-label="Previous">&lsaquo;</button>
    <button class="lightbox-next" aria-label="Next">&rsaquo;</button>
    <div class="lightbox-content">
      <img src="" alt="" id="lightbox-img">
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p class="footer-logo">Soodi Arts</p>
      <p>&copy; 2026 Soodi Arts. All rights reserved.</p>
    </div>
  </footer>

  <script src="gallery-data.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
